<!DOCTYPE html>
<html>
<head>
    <title>Shrimp Risk System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🦐 Shrimp Risk Intelligence System</h1>
    <p>Upload water quality dataset → Predict risk</p>

    <!-- Upload Section -->
    <div class="card">
        <h3>📂 Upload CSV</h3>
        <input type="file" id="fileInput" accept=".csv">
        <button onclick="uploadFile()">Run Prediction</button>
    </div>

    <!-- Preview -->
    <div class="card">
        <h3>📊 Data Preview</h3>
        <table id="previewTable"></table>
    </div>

    <!-- Results -->
    <div class="card">
        <h3>📈 Prediction Results</h3>
        <table id="resultTable"></table>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
